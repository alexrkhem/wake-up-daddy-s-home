[theme]
base = "dark"
backgroundColor       = "#1a1814"
secondaryBackgroundColor = "#2d2520"
textColor             = "#f0e6d3"
primaryColor          = "#d4681e"
font                  = "monospace"

[server]
port        = 8501
address     = "0.0.0.0"
headless    = true
enableCORS  = false
enableXsrfProtection = false
maxUploadSize = 200

[browser]
gatherUsageStats = false
serverAddress    = "localhost"
serverPort       = 8501

[runner]
fastReruns = true

[logger]
level = "warning"
